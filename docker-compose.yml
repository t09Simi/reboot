services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reboot
      POSTGRES_USER: reboot_user
      POSTGRES_PASSWORD: reboot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reboot_user -d reboot"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      SECRET_KEY: dev-secret-key-for-docker-only-change-in-prod
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DATABASE_URL: postgres://reboot_user:reboot_password@db:5432/reboot
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SECURE_HTTPS: "False"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data: